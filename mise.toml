[tools]
go = "1.26.2"
golangci-lint = "2"
protoc = "latest"
protoc-gen-go = "latest"
protoc-gen-go-grpc = "latest"

[tasks.build]
description = "Build all binaries"
run = """
if [ -n "$GITHUB_SHA" ]; then
  go build -ldflags "-X main.Version=$GITHUB_SHA" ./...
else
  go build ./...
fi
"""

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks."test:integration"]
description = "Run integration tests"
run = "go test -tags integration -v -timeout 480s ./test/integration/"

[tasks."docker:server"]
description = "Build the maddock-server container image"
run = """
VERSION="${GITHUB_SHA:-dev}"
docker build -f Containerfile.server -t maddock-server:${VERSION} -t maddock-server:latest --build-arg VERSION=${VERSION} .
"""

[tasks.proto]
description = "Generate Go code from protobuf definitions"
run = """
protoc --go_out=. --go_opt=paths=source_relative \
       --go-grpc_out=. --go-grpc_opt=paths=source_relative \
       internal/transport/proto/maddock.proto
"""

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.check]
description = "Run lint, build, and tests"
depends = ["lint", "build", "test"]
