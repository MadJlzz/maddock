[tools]
go = "1.26.1"
golangci-lint = "2"

[tasks.build]
description = "Build all binaries"
run = "report build ./..."

[tasks.test]
description = "Run all tests"
run = "report test ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.check]
description = "Run lint, build, and tests"
depends = ["lint", "build", "test"]
