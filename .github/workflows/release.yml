name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # to create releases and upload assets
  packages: write   # to push images to ghcr.io

jobs:
  agent:
    name: Build and release agent binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: jdx/mise-action@v4.0.1

      - name: Build agent binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags "-X main.Version=${GITHUB_REF_NAME}" \
            -o dist/maddock-agent-linux-${{ matrix.arch }} \
            ./cmd/agent/

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/maddock-agent-linux-${{ matrix.arch }}
          fail_on_unmatched_files: true

  server:
    name: Build and push server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/maddock-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
